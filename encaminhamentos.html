<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Encaminhamentos do JURISLAB Aconselha">
  <title>Encaminhamentos | JURISLAB Aconselha</title>
  <link rel="stylesheet" href="css/style.css?v=4">
  <link rel="stylesheet" href="css/encaminhamentos.css?v=1">
</head>
<body class="pagina-encaminhamentos">
  <header class="encaminhamentos-topo">
    <a class="marca marca-com-logo" href="dashboard.html"><img src="./assets/imagens/logo-unisced.png?v=4" alt="Logótipo da UnISCED" class="logo-unisced"><div class="marca-jurislab"><span class="marca-principal">JURISLAB Aconselha</span><span class="marca-subtitulo">Acompanhamento de encaminhamentos</span></div></a>
    <nav class="acoes-topo"><a href="casos.html">Casos</a><a href="gestao-aconselha.html">Utentes</a><a href="dashboard.html">Painel</a></nav>
  </header>
  <main class="encaminhamentos-conteudo">
    <section class="encaminhamentos-cabecalho"><p class="etiqueta">Apoio jurídico externo</p><h1>Encaminhamentos registados</h1><p>Consulte os casos enviados a outras instituições e acompanhe as datas de retorno.</p></section>
    <section class="filtros-cartao"><form id="formFiltros" class="filtros-formulario"><input id="campoPesquisa" type="search" placeholder="Código, caso, instituição, contacto..."><select id="filtroEstado"><option value="Todos">Todos os estados</option><option>Encaminhado</option><option>Em seguimento</option><option>Respondido</option><option>Concluído</option><option>Sem retorno</option></select><button class="botao botao-principal" type="submit">Pesquisar</button><button class="botao botao-secundario" id="btnLimpar" type="button">Limpar</button></form><p id="resumoResultados" class="resumo-resultados">A carregar encaminhamentos...</p></section>
    <section id="listaEncaminhamentos" class="lista-encaminhamentos" aria-live="polite"></section><p id="mensagemEncaminhamentos" class="mensagem-formulario"></p>
  </main>
  <div class="ecrã-validacao" id="ecraValidacao"><div><strong>JURISLAB Aconselha</strong><p>A validar a sua sessão...</p></div></div>
  <script src="js/encaminhamentos.js?v=1"></script>
</body>
</html>
